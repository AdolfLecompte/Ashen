# ══════════════════════════════════════════
#   Ashen — Hypridle
# ══════════════════════════════════════════
general {
    lock_cmd = qs ipc -c ashen call lockscreen lock
    before_sleep_cmd = qs ipc -c ashen call lockscreen lock
    after_sleep_cmd = hyprctl dispatch dpms on
}

# Auto-lock after 5 minutes idle
listener {
    timeout = 300
    on-timeout = qs ipc -c ashen call lockscreen lock
}

# Turn the screen off after 10 minutes (if still idle after locking)
listener {
    timeout = 600
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}
